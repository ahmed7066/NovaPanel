
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>NovaPanel Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Remix Icons -->
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
  rel="stylesheet">
</head>

<body>

  <!-- Sidebar -->

  <aside class="sidebar">

    <div class="logo">

      <i class="ri-flashlight-fill"></i>

      <span>NovaPanel</span>

    </div>

    <nav>

      <a href="#" class="active">

        <i class="ri-dashboard-fill"></i>

        <span>Dashboard</span>

      </a>

      <a href="#">

        <i class="ri-bar-chart-box-fill"></i>

        <span>Analytics</span>

      </a>

      <a href="#">

        <i class="ri-task-fill"></i>

        <nav>

  <a href="index.html" class="active">

    <i class="ri-dashboard-fill"></i>

    <span>Dashboard</span>

  </a>

  <a href="pages/analytics.html">

    <i class="ri-bar-chart-box-fill"></i>

    <span>Analytics</span>

  </a>

  <a href="pages/tasks.html">

    <i class="ri-task-fill"></i>

    <span>Tasks</span>

  </a>

  <a href="pages/settings.html">

    <i class="ri-settings-3-fill"></i>

    <span>Settings</span>

  </a>

  <a href="#">

    <i class="ri-user-fill"></i>

    <span>Profile</span>

  </a>

</nav>

  </aside>

  <!-- Main Content -->

  <main class="main-content">

    <!-- Topbar -->

    <header class="topbar">

      <div class="search-box">

        <i class="ri-search-line"></i>

        <input
        type="text"
        placeholder="Search...">

      </div>

      <div class="topbar-right">

        <button class="theme-btn">

          <i class="ri-moon-fill"></i>

        </button>

        <div class="profile">

          <img
          src="https://i.pravatar.cc/100"
          alt="Profile">

          <div>

            <h4>Ahmed Hassan</h4>

            <p>Frontend Developer</p>

          </div>

        </div>

      </div>

    </header>

    <!-- Dashboard Title -->

    <section class="dashboard-title">

      <h1>Welcome Back 👋</h1>

      <p>
        Here’s what’s happening with your dashboard today.
      </p>

    </section>

    <!-- Cards -->

    <section class="cards">

      <div class="card">

        <div class="card-info">

          <h3>Total Revenue</h3>

          <h1>$24,890</h1>

        </div>

        <i class="ri-money-dollar-circle-fill"></i>

      </div>

      <div class="card">

        <div class="card-info">

          <h3>Users</h3>

          <h1>8,420</h1>

        </div>

        <i class="ri-user-3-fill"></i>

      </div>

      <div class="card">

        <div class="card-info">

          <h3>Projects</h3>

          <h1>128</h1>

        </div>

        <i class="ri-folder-fill"></i>

      </div>

      <div class="card">

        <div class="card-info">

          <h3>Growth</h3>

          <h1>+18%</h1>

        </div>

        <i class="ri-line-chart-fill"></i>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
