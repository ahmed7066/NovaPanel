<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>NovaPanel - Analytics</title>

  <link
  rel="stylesheet"
  href="../style.css">

</head>

<body>

  <!-- ===== Sidebar ===== -->

  <aside class="sidebar">

    <div class="logo">

      <div class="logo-box">
        ⚡
      </div>

      <h2>NovaPanel</h2>

    </div>

    <nav class="menu">

      <a href="../index.html">

        🏠 الرئيسية

      </a>

      <a
      href="analytics.html"
      class="active">

        📊 التحليلات

      </a>

      <a href="tasks.html">

        ✅ المهام

      </a>

      <a href="settings.html">

        ⚙ الإعدادات

      </a>

    </nav>

  </aside>

  <!-- ===== Main ===== -->

  <main class="main">

    <!-- ===== Top ===== -->

    <div class="topbar">

      <h1>
        📊 Analytics Dashboard
      </h1>

      <input
      type="text"
      placeholder="ابحث..."
      class="search-box">

    </div>

    <!-- ===== Cards ===== -->

    <section class="cards">

      <div class="card">

        <h3>
          عدد المستخدمين
        </h3>

        <div class="number">
          12,480
        </div>

        <div class="status">
          +12.5%
        </div>

      </div>

      <div class="card">

        <h3>
          الزيارات اليومية
        </h3>

        <div class="number">
          8,920
        </div>

        <div class="status">
          +8.2%
        </div>

      </div>

      <div class="card">

        <h3>
          الأرباح
        </h3>

        <div class="number">
          $4,350
        </div>

        <div class="status">
          +16.1%
        </div>

      </div>

    </section>

    <!-- ===== Chart ===== -->

    <section class="chart-box">

      <div class="chart-header">

        <h2>
          إحصائيات الأسبوع
        </h2>

      </div>

      <div class="chart">

        <div
        class="bar"
        style="height:45%">

          <span>Sat</span>

        </div>

        <div
        class="bar"
        style="height:65%">

          <span>Sun</span>

        </div>

        <div
        class="bar"
        style="height:85%">

          <span>Mon</span>

        </div>

        <div
        class="bar"
        style="height:55%">

          <span>Tue</span>

        </div>

        <div
        class="bar"
        style="height:95%">

          <span>Wed</span>

        </div>

        <div
        class="bar"
        style="height:75%">

          <span>Thu</span>

        </div>

        <div
        class="bar"
        style="height:60%">

          <span>Fri</span>

        </div>

      </div>

    </section>

  </main>

</body>

</html>
