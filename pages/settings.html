<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>NovaPanel - Tasks</title>

  <link
  rel="stylesheet"
  href="../style.css">

</head>

<body>

  <!-- ===== Sidebar ===== -->

  <aside class="sidebar">

    <div class="logo">

      <div class="logo-box">
        ⚡
      </div>

      <h2>NovaPanel</h2>

    </div>

    <nav class="menu">

      <a href="../index.html">

        🏠 الرئيسية

      </a>

      <a href="analytics.html">

        📊 التحليلات

      </a>

      <a
      href="tasks.html"
      class="active">

        ✅ المهام

      </a>

      <a href="settings.html">

        ⚙ الإعدادات

      </a>

    </nav>

  </aside>

  <!-- ===== Main ===== -->

  <main class="main">

    <!-- ===== Topbar ===== -->

    <div class="topbar">

      <h1>
        ✅ إدارة المهام
      </h1>

      <input
      type="text"
      placeholder="ابحث عن مهمة..."
      class="search-box">

    </div>

    <!-- ===== Tasks ===== -->

    <section class="tasks">

      <!-- ===== Box 1 ===== -->

      <div class="task-box">

        <h2>
          🚀 مهام اليوم
        </h2>

        <div class="task">

          <div>

            تصميم Dashboard جديد

          </div>

          <span class="badge progress">

            جاري التنفيذ

          </span>

        </div>

        <div class="task">

          <div>

            تعديل صفحة Login

          </div>

          <span class="badge done">

            مكتمل

          </span>

        </div>

        <div class="task">

          <div>

            تحسين Responsive

          </div>

          <span class="badge pending">

            متأخر

          </span>

        </div>

      </div>

      <!-- ===== Box 2 ===== -->

      <div class="task-box">

        <h2>
          📌 مهام الأسبوع
        </h2>

        <div class="task">

          <div>

            إنشاء صفحة Analytics

          </div>

          <span class="badge done">

            مكتمل

          </span>

        </div>

        <div class="task">

          <div>

            إضافة Dark Mode

          </div>

          <span class="badge progress">

            جاري التنفيذ

          </span>

        </div>

        <div class="task">

          <div>

            تطوير API System

          </div>

          <span class="badge pending">

            Pending

          </span>

        </div>

      </div>

    </section>

  </main>

</body>

</html>
